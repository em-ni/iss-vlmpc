name: pyel
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  - numpy
  - scipy
  - pandas
  - matplotlib
  - pytorch
  - cudatoolkit=11.8
  - pip
  - pip:
      - --prefer-binary
      - casadi
      - pyelastica
      - pyqt5==5.15.9
      - transformers
      - accelerate
      - sentencepiece
      - google-generativeai
      - huggingface-hub
      - tqdm
      - scikit-learn
